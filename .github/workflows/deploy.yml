name: Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check cloud/ tests/

      - name: Test
        run: python3 -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tradingbot/app:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        env:
          IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tradingbot/app:${{ github.sha }}
        run: |
          gcloud run deploy tradingbot \
            --image="$IMAGE" \
            --region=europe-west1 \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            --min-instances=1 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=30 \
            --concurrency=10 \
            --allow-unauthenticated \
            --set-secrets="\
WEBHOOK_SECRET=WEBHOOK_SECRET:latest,\
BINANCE_API_KEY=BINANCE_API_KEY:latest,\
BINANCE_API_SECRET=BINANCE_API_SECRET:latest,\
TRADING_MODE=TRADING_MODE:latest,\
TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,\
TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,\
AUTO_TRADE_ENABLED=AUTO_TRADE_ENABLED:latest,\
AUTO_TRADE_MIN_SIGNALS=AUTO_TRADE_MIN_SIGNALS:latest"
